<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bengali Softwares App Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins;
background:#f1f3f6;
}

header{
background:#00c853;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.search-box{
padding:15px;
text-align:center;
background:white;
}

.search-box input{
width:90%;
max-width:400px;
padding:12px;
border-radius:25px;
border:1px solid #ccc;
font-size:16px;
}

.apps{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
}

.app{
background:white;
width:200px;
padding:15px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
transition:0.3s;
}

.app:hover{
transform:translateY(-5px);
}

.app img{
width:80px;
border-radius:20px;
}

.app h3{
margin:10px 0;
font-size:18px;
}

.btn{
display:block;
padding:10px;
margin:5px;
border-radius:20px;
text-decoration:none;
color:white;
cursor:pointer;
}

.download{
background:#00c853;
}

.details{
background:#2962ff;
}

/* popup */

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:15px;
max-width:400px;
width:90%;
text-align:center;
}

.popup-box img{
width:70px;
margin:5px;
border-radius:10px;
}

.close{
background:red;
color:white;
padding:10px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
}

.contact{
background:white;
padding:30px;
text-align:center;
}
</style>
</head>

<body>

<header>Bengali Softwares App Store</header>

<div class="search-box">
<input type="text" placeholder="Search app..." onkeyup="searchApp(this.value)">
</div>

<section class="apps">

<!-- Lal Blood -->
<div class="app" data-name="Lal Blood">
<img src="icon.png">
<h3>Lal Blood</h3>

<div class="btn details"
onclick="showDetails(
'Lal Blood',
'Find blood donors easily.\nFast and secure app.',
'myapp.apk',
['screenshot1.png','screenshot2.png']
)">
Details
</div>

<a href="myapp.apk" class="btn download">Download</a>
</div>

<!-- Love Calculator -->
<div class="app" data-name="Love Calculator">
<img src="love.png">
<h3>Love Calculator</h3>

<div class="btn details"
onclick="showDetails(
'Love Calculator',
`লাভ ক্যালকুলেটর (Love Calculator)

🔹 ছোট বিবরণ:
সহজেই জানুন আপনার ভালোবাসার শতাংশ! 💖

🔹 বিস্তারিত:
দুইজনের নাম লিখে দেখুন ভালোবাসার মিল কত পার্সেন্ট।
বন্ধু, ক্রাশ বা স্পেশাল কারও সাথে মিল এখনই চেক করুন!

✔️ ব্যবহার করা সহজ
✔️ দ্রুত ফলাফল
✔️ বন্ধুদের সাথে শেয়ার`,
'love.apk',
['love1.png','love2.png']
)">
Details
</div>

<a href="love.apk" class="btn download">Download</a>
</div>

</section>

<!-- Popup -->
<div class="popup" id="popup" onclick="outsideClick(event)">
<div class="popup-box" onclick="event.stopPropagation()">
<h2 id="name"></h2>
<p id="desc"></p>
<div id="screens"></div>
<a id="download" class="btn download">Download</a>
<div class="close" onclick="closePopup()">Close</div>
</div>
</div>

<script>

function showDetails(name, desc, apk, screenshots){

history.pushState({popup:true}, "");

document.getElementById("popup").style.display="flex";
document.getElementById("name").innerText=name;
document.getElementById("desc").innerHTML=desc.replace(/\n/g,"<br>");
document.getElementById("download").href=apk;

let screens=document.getElementById("screens");
screens.innerHTML="";

screenshots.forEach(img=>{
screens.innerHTML+=`<img src="${img}">`;
});
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function outsideClick(event){
if(event.target.classList.contains("popup")){
closePopup();
history.back();
}
}

window.onpopstate = function(){
let popup=document.getElementById("popup");

if(popup.style.display==="flex"){
popup.style.display="none";
}
};

function searchApp(value){
let apps=document.querySelectorAll(".app");

apps.forEach(app=>{
let name=app.getAttribute("data-name").toLowerCase();

if(name.includes(value.toLowerCase()))
app.style.display="block";
else
app.style.display="none";
});
}

</script>

</body>
</html>
